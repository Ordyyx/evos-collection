<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0c0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Collection</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💿</text></svg>"
    />
  </head>
  <body>
    <header class="header">
      <div class="logo">Evo's Record Collection</div>
      <div class="header-right">
        <!-- View Toggle -->
        <div class="view-toggle" id="viewToggle">
          <button class="view-btn active" data-view="grid" title="Grid View">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
            </svg>
          </button>
          <button class="view-btn" data-view="shelf" title="Shelf View">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="4" rx="1"/>
              <rect x="2" y="10" width="20" height="4" rx="1"/>
              <rect x="2" y="16" width="20" height="4" rx="1"/>
            </svg>
          </button>
        </div>
        <div class="record-count"><span id="count">0</span> records</div>
        <a href="admin.html" class="admin-link" id="adminLink" style="display: none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span class="admin-link-text">Admin</span>
        </a>
      </div>
    </header>

    <!-- Loading State -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner">
        <div class="vinyl-loader">
          <div class="vinyl-loader-disc"></div>
        </div>
        <p>Loading collection...</p>
      </div>
    </div>

    <main class="collection">
      <div class="grid" id="grid"></div>
    </main>

    <!-- Now Playing Modal -->
    <div class="now-playing-overlay" id="nowPlaying">
      <div class="now-playing" onclick="event.stopPropagation()">
        <div class="now-playing-cover">
          <img id="npCover" src="" alt="" />
        </div>
        <div class="now-playing-details">
          <div class="now-playing-rating" id="npRating"></div>
          <h1 class="now-playing-title" id="npTitle"></h1>
          <p class="now-playing-artist" id="npArtist"></p>
          <p class="now-playing-meta">
            <span id="npYear"></span>
            <span class="meta-separator" id="npGenreSeparator">•</span>
            <span id="npGenre"></span>
          </p>
          <div class="now-playing-links" id="npLinks"></div>
        </div>
        <div class="now-playing-tracklist" id="npTracklist"></div>
      </div>
      <span class="escape-hint">Click outside or press Esc to close • ← → to browse</span>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
