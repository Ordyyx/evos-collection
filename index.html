<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wax</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💿</text></svg>"
    />
  </head>
  <body>
    <header class="header">
      <div class="logo">Evo's Record Collection</div>
      <div class="record-count"><span id="count">0</span> records</div>
    </header>

    <main class="collection">
      <div class="grid" id="grid"></div>
    </main>

    <!-- Now Playing Modal -->
    <div class="now-playing-overlay" id="nowPlaying">
      <div class="now-playing">
        <div class="now-playing-cover">
          <img id="npCover" src="" alt="" />
        </div>
        <div class="now-playing-details">
          <h1 class="now-playing-title" id="npTitle"></h1>
          <p class="now-playing-artist" id="npArtist"></p>
          <p class="now-playing-year" id="npYear"></p>
        </div>
      </div>
      <span class="escape-hint">Click or press Esc to close</span>
    </div>

    <script src="app.js"></script>
  </body>
</html>
